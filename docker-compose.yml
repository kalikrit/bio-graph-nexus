version: "3.8"

services:
  neo4j:
    image: neo4j:5.19.0
    container_name: biograph-neo4j
    ports:
      - "7474:7474"   # HTTP (браузер)
      - "7687:7687"   # Bolt (драйвер)
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: biograph-backend
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - SPACY_MODEL=${SPACY_MODEL:-en_core_web_lg}
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build: ./frontend
    container_name: biograph-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  neo4j_data:
  neo4j_logs: